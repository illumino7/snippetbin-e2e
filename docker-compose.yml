services:
  db:
    build: .
    container_name: snippetbin-e2e-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=snippetbin-e2e
    ports:
      - "5432:5432"
    volumes:
      - snippetbin-e2e-db-data:/var/lib/postgresql
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=snippetbin-e2e
  s3:
    image: quay.io/minio/minio:latest
    container_name: snippetbin-e2e-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminpassword
    volumes:
      - snippetbin-e2e-s3-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  s3-init:
    image: minio/mc
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://s3:9000 admin adminpassword;
      /usr/bin/mc mb --ignore-existing local/snippets;
      /usr/bin/mc ilm rule add local/snippets --expire-days 365 --prefix '' || true;
      exit 0;
      "
  
  valkey:
    image: valkey/valkey:alpine
    container_name: snippetbin-e2e-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - snippetbin-e2e-valkey-data:/data
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey-commander:
    container_name: snippetbin-e2e-valkey-commander
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=snippetbin-e2e-valkey
      - REDIS_PORT=6379
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
  

volumes:
  snippetbin-e2e-db-data:
  snippetbin-e2e-s3-data:
  snippetbin-e2e-valkey-data: