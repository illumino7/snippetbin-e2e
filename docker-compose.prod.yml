# Production override — adds backend + frontend app containers
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: snippetbin-e2e-backend
    ports:
      - "5050:5050"
    environment:
      - DB_ADDR=postgres://admin:adminpassword@db:5432/snippetbin-e2e?sslmode=disable
      - S3_ENDPOINT=s3:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=adminpassword
      - S3_BUCKET=snippets
      - S3_USE_SSL=false
      - CACHE_ADDR=valkey
      - CACHE_PORT=6379
    depends_on:
      db:
        condition: service_started
      s3:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: snippetbin-e2e-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
